<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de pedido</title>
</head>

<body>
    <button onclick="window.versions.irParaHome()">Voltar</button>
    <form>
        <label for="id_cliente">ID do Cliente:</label>
        <input type="number" id="id_cliente" name="id_cliente" required>
        <br>
        <label for="id_produto">ID do Produto:</label>
        <input type="number" id="id_produto" name="id_produto" required>
        <br>
        <label for="quantidade">Quantidade:</label>
        <input type="number" id="quantidade" name="quantidade" required>
        <br>
        <button id="adicionar-item">Adicionar Item ao Pedido</button>
        <button type="submit">Cadastrar Pedido</button>
        <ul id="itens-pedido"></ul>
    </form>
</body>
<script type="module">
    const form = document.getElementsByTagName('form')[0]
    const idClienteInput = document.getElementById('id_cliente')
    const idProdutoInput = document.getElementById('id_produto')
    const quantidadeInput = document.getElementById('quantidade')
    const itensPedidoList = document.getElementById('itens-pedido')
    const adicionarItemButton = document.getElementById('adicionar-item')
    const itensPedido = []
    adicionarItemButton.addEventListener('click', (event) => {
        event.preventDefault()
        const idProduto = idProdutoInput.value
        const quantidade = quantidadeInput.value
        const item = document.createElement('li')
        item.innerHTML += `Produto: ${idProduto}, Quantidade: ${quantidade}`
        itensPedidoList.appendChild(item)
        itensPedido.push({ idProduto, quantidade })
    })

    form.addEventListener('submit', async (event) => {
        event.preventDefault()
        const idCliente = idClienteInput.value
        const response = await window.versions.salvarPedido({ idCliente, itens: itensPedido })
        console.log(response)
    })
</script>

</html>
